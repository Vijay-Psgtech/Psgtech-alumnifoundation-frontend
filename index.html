<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>PSG TECH Alumni Foundation | PSG TECH Alumni Portal</title>
    <meta
      name="description"
      content="Official PSG TECH Alumni Foundation portal. Connect with alumni, explore events, career opportunities, and stay updated with PSG TECH community."
    />
    <meta
      name="keywords"
      content="PSG TECH Alumni, PSG TECH Alumni Foundation, PSG College Alumni, Coimbatore Alumni Network, PSG Events, Alumni Portal India"
    />
    <meta name="author" content="PSG TECH Alumni Foundation" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/psg_logo.jpg" />

    <!-- Theme Color (Mobile browsers) -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PSG TECH Alumni Foundation" />
    <meta
      property="og:description"
      content="Connect with PSG TECH alumni, attend events, and grow your professional network."
    />
    <meta property="og:image" content="https://yourdomain.com/og-image.png" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:site_name" content="PSG TECH Alumni Foundation" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PSG TECH Alumni Foundation" />
    <meta
      name="twitter:description"
      content="Join PSG TECH Alumni Foundation and stay connected."
    />
    <meta name="twitter:image" content="https://yourdomain.com/og-image.png" />

    <!-- Performance Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Example Google Font (optional) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />

    <!-- Preload Important Assets -->
    <link rel="preload" href="/psgcas.png" as="image" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/psgcas.png" />

    <!-- Manifest (PWA support) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PSG TECH Alumni Foundation",
        "url": "https://yourdomain.com",
        "logo": "https://yourdomain.com/psgcas.png",
        "sameAs": ["https://www.linkedin.com/", "https://www.facebook.com/"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
